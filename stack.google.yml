version: '3.7'

services:
  trac-nghiem-online:
    image: trac-nghiem-online
    hostname: trac-nghiem-online
    environment:
      - DISCOVERY_SERVICE_ADDRESS=http://eureka:8761/eureka
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - ACTIVE_PROFILE=dev
      - KAFKA_SERVERS=kafka:9092
    volumes:
      - /home/test/trac-nghiem-online/uploads:/uploads
      - /home/test/trac-nghiem-online/downloads:/downloads
      - /home/test/trac-nghiem-online/logs:/logs
    deploy:
      replicas: 1
      update_config:
        parallelism: 2
        delay: 10s
      endpoint_mode: dnsrr #dns round robbin
    networks:
      - app-net

networks:
  app-net:
    external: true
